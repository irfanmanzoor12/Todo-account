apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: accounting-pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      secretKeyRef:
        name: ledger-secrets
        key: KAFKA_BROKER
    - name: authType
      value: "password"
    - name: saslUsername
      secretKeyRef:
        name: ledger-secrets
        key: KAFKA_USERNAME
    - name: saslPassword
      secretKeyRef:
        name: ledger-secrets
        key: KAFKA_PASSWORD
    - name: saslMechanism
      value: "SCRAM-SHA-256"
    - name: initialOffset
      value: "newest"
    - name: disableTls
      value: "false"
